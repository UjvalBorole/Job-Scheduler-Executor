apiVersion: v1
kind: ConfigMap
metadata:
  name: job-service-config
  namespace: job-scheduler
data:
  TZ: Asia/Kolkata
  JAVA_TOOL_OPTIONS: "-Duser.timezone=Asia/Kolkata"
  SPRING_APPLICATION_NAME: job-service
  SPRING_PROFILES_ACTIVE: kubernetes
  SERVER_PORT: "8081"
  SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka.data.svc.cluster.local:9092
  REDIS_HOST: redis.data.svc.cluster.local
  REDIS_PORT: "6379"
  OBJECT_STORAGE_ENDPOINT: http://minio.data.svc.cluster.local:9000
  OBJECT_STORAGE_BUCKET: job-uploads
  MANAGEMENT_TRACING_ENABLED: "true"
  MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://tempo.observability.svc.cluster.local:9411/api/v2/spans
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-service
  namespace: job-scheduler
  labels:
    app: job-service
spec:
  replicas: 2
  revisionHistoryLimit: 5
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: job-service
  template:
    metadata:
      labels:
        app: job-service
        logging: promtail
    spec:
      terminationGracePeriodSeconds: 45
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: job-service
                topologyKey: kubernetes.io/hostname
      containers:
        - name: job-service
          image: boroleujval4/job-service:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
          envFrom:
            - configMapRef:
                name: job-service-config
          env:
            - name: OBJECT_STORAGE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-app-secret
                  key: access-key
            - name: OBJECT_STORAGE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-app-secret
                  key: secret-key
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 90
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: job-service
  namespace: job-scheduler
  labels:
    app: job-service
spec:
  type: ClusterIP
  selector:
    app: job-service
  ports:
    - name: http
      port: 8081
      targetPort: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: job-service
  namespace: job-scheduler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: job-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
