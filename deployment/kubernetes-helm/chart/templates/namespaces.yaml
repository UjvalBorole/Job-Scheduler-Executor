{{- if .Values.namespaces.create }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.namespaces.app }}
  labels:
    app.kubernetes.io/part-of: {{ .Values.global.partOf }}
    environment: {{ .Values.namespaces.environment }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.namespaces.data }}
  labels:
    app.kubernetes.io/part-of: {{ .Values.global.partOf }}
    environment: {{ .Values.namespaces.environment }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.namespaces.observability }}
  labels:
    app.kubernetes.io/part-of: {{ .Values.global.partOf }}
    environment: {{ .Values.namespaces.environment }}
{{- end }}

