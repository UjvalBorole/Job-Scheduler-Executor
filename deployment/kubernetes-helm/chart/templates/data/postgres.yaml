{{- $db := .Values.data.postgres }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $db.name }}-secret
  namespace: {{ .Values.namespaces.data }}
type: Opaque
stringData:
  POSTGRES_USER: {{ $db.username | quote }}
  POSTGRES_PASSWORD: {{ $db.password | quote }}
  POSTGRES_DB: {{ $db.database | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $db.name }}
  namespace: {{ .Values.namespaces.data }}
  labels:
    app: {{ $db.name }}
spec:
  type: ClusterIP
  selector:
    app: {{ $db.name }}
  ports:
    - name: postgres
      port: {{ $db.port }}
      targetPort: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $db.name }}
  namespace: {{ .Values.namespaces.data }}
  labels:
    app: {{ $db.name }}
spec:
  serviceName: {{ $db.name }}
  replicas: {{ $db.replicas }}
  selector:
    matchLabels:
      app: {{ $db.name }}
  template:
    metadata:
      labels:
        app: {{ $db.name }}
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: {{ $db.name }}
          image: {{ $db.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: postgres
              containerPort: {{ $db.port }}
          envFrom:
            - secretRef:
                name: {{ $db.name }}-secret
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            {{- toYaml $db.resources | nindent 12 }}
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        {{- include "job-platform.pvcStorageClass" $db | nindent 8 }}
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ $db.storage }}

