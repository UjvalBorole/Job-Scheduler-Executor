apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: job-scheduler
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200

    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
            http:
        zipkin: {}

    ingester:
      trace_idle_period: 10s
      max_block_bytes: 52428800
      max_block_duration: 5m


    compactor:
      compaction:
        compaction_window: 1h
        max_compaction_objects: 1000000
        block_retention: 1h
        compacted_block_retention: 10m

    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/blocks
        wal:
          path: /var/tempo/wal
