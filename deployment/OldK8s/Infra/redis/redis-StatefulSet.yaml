---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: job-scheduler
spec:
  serviceName: redis
  replicas: 2
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      nodeSelector:
        node-type: infra
      containers:
        - name: redis
          image: redis:7
          ports:
            - containerPort: 6379
          command:
            - "redis-server"
            - "/etc/redis/redis.conf"
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /data      # Redis persistent data
            - name: redis-config
              mountPath: /etc/redis

      volumes:
        - name: redis-config
          configMap:
            name: redis-config
            items:
              - key: redis.conf
                path: redis.conf

  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 1Gi      # can increase to 5Gi as needed
