# ----------------------------------------
# Kafka headless service (peer discovery)
# ----------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: job-scheduler
spec:
  clusterIP: None
  selector:
    app: kafka
  ports:
    - port: 9092
      name: client