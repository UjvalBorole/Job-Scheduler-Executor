apiVersion: v1
kind: Service
metadata:
  name: mongodb-headless
  namespace: job-scheduler
spec:
  clusterIP: None
  selector:
    app: mongodb
  ports:
    - name: mongo
      port: 27017

#       Required by StatefulSet for stable DNS:

# mongodb-0.mongodb-headless.job-scheduler.svc.cluster.local

# mongodb-1.mongodb-headless.job-scheduler.svc.cluster.local