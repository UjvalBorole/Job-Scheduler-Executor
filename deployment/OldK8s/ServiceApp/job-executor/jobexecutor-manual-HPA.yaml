apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: job-manual-executor-hpa
  namespace: job-scheduler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: job-manual-executor
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
