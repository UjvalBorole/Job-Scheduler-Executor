apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: job-scheduler
spec:
  serviceName: mongodb-headless
  replicas: 2
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      nodeSelector:
        node-type: infra
      containers:
        - name: mongodb
          image: mongo:6.0
          ports:
            - containerPort: 27017
          env:
            - name: TZ
              value: Asia/Kolkata
            - name: JAVA_TOOL_OPTIONS
              value: "-Duser.timezone=Asia/Kolkata"
            - name: MONGO_INITDB_ROOT_USERNAME
              value: admin
            - name: MONGO_INITDB_ROOT_PASSWORD
              value: admin123

          # Allow data persistence
          volumeMounts:
            - name: mongo-storage
              mountPath: /data/db

  # PVC created automatically per replica
  volumeClaimTemplates:
    - metadata:
        name: mongo-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 1Gi




#             Each replica gets its own:

# Persistent volume

# Stable hostname

# Stable identity

# PVC names will be:

# mongo-storage-mongodb-0
# mongo-storage-mongodb-1