# -------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: job-scheduler
spec:
  clusterIP: None        # headless service
  publishNotReadyAddresses: true 
  selector:
    app: kafka
  ports:
    - port: 9092
      name: broker
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: job-scheduler
spec:
  serviceName: kafka
  replicas: 2            # Set to your desired replica count
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      nodeSelector:
        node-type: infra
      # REMOVE THESE LINES - they break StatefulSet pod naming:
      # hostname: kafka
      # subdomain: kafka
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.6.0
          ports:
            - containerPort: 9092
              name: broker
          env:     
            - name: TZ
              value: Asia/Kolkata
            - name: JAVA_TOOL_OPTIONS
              value: "-Duser.timezone=Asia/Kolkata"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: "zookeeper.job-scheduler.svc.cluster.local:2181"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: PLAINTEXT:PLAINTEXT
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://0.0.0.0:9092"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR #i have 2 replicas means 2 broker so need 2 replication factor one topic copy on each broker , rf >= brokers -- kafka rule 
              value: "2"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR # similar to above rule for transaction topic, 2 copies - 2 brokers available
              value: "2"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR #Minimum brokers that MUST be alive to accept writes If one broker diesKafka will stop accepting writes Entire cluster appears “stuck” until broker is restored
              value: "1"
            - name: KAFKA_LOG_RETENTION_HOURS
              value: "168"
          command: ["/bin/bash", "-c"]
          # args:
          #   - |
          #     # Extract numeric broker ID from pod name (kafka-0, kafka-1, etc.)
          #     export KAFKA_BROKER_ID=$(echo "$POD_NAME" | awk -F '-' '{print $NF}');
          #     echo "Broker ID resolved to: $KAFKA_BROKER_ID";

          #     # Set advertised listener dynamically for each pod
          #     export KAFKA_ADVERTISED_LISTENERS="PLAINTEXT://$POD_NAME.kafka.job-scheduler.svc.cluster.local:9092";

          #     # Start Kafka
          #     /etc/confluent/docker/run
          args:
            - |
              export KAFKA_BROKER_ID=$(echo "$POD_NAME" | awk -F '-' '{print $NF}');
              export KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://$(hostname -f):9092;
              echo "Broker ID: $KAFKA_BROKER_ID";
              echo "Advertised listener: $KAFKA_ADVERTISED_LISTENERS";
              /etc/confluent/docker/run
          volumeMounts:
            - name: data
              mountPath: /var/lib/kafka/data

  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 1Gi



# check first __consumer_offsets
#  kafka-console-consumer   --bootstrap-server kafka-0.kafka.job-scheduler.svc.cluster.local:9092   --topic job_topics   --fro
# m-beginning


# They are for Kafka’s own internal system topics.
# Kafka has hidden internal topics:
# Topic	Purpose
# __consumer_offsets	Stores where each consumer stopped reading
# __transaction_state	Used for exactly-once / transactions
# 👉 If these break, consumers break.





