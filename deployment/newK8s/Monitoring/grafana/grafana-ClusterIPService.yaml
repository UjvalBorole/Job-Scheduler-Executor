---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: job-scheduler
spec:
  selector:
    app: grafana
  ports:
    - protocol: TCP
      port: 3000       # Grafana default port
      targetPort: 3000
      nodePort: 32000  # Browser access
  type: NodePort