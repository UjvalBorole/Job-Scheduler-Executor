apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: job-scheduler
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:9090"]

      # Example: scrape Kubernetes pods (optional later)
      # - job_name: "kubernetes-pods"
      #   kubernetes_sd_configs:
      #     - role: pod
