---
apiVersion: v1
kind: Service
metadata:
  name: config-server
  namespace: job-scheduler
spec:
  selector:
    app: config-server
  ports:
    - protocol: TCP
      port: 8092          # Cluster-internal port
      targetPort: 8092    # Pod container port
  type: ClusterIP        # Internal access only